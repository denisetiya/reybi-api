apinox: '1.0'
name: Reybi API
version: 1.0.0
description: "Reybi API — Rust rewrite (Axum 0.8).\nE-commerce platform with cart,\
  \ orders, deposite, waste management.\n\n## Cursor Pagination\n\nAll list endpoints\
  \ use cursor-based pagination (NO offset). This ensures stable\npagination even\
  \ when rows are inserted/deleted between requests.\n\n### How It Works\n\n```\n\
  GET /v1/products?cursor=eyJpZCI6NTB9&limit=25\n```\n\n1. **First page** — omit `cursor`,\
  \ API returns first N items\n2. **Next pages** — use `cursor` from `meta.pagination`\
  \ of previous response\n3. **Last page** — `has_more: false`, `cursor: null`\n\n\
  ### Response Format\n\n```json\n{\n  \"success\": true,\n  \"data\": [ ... ],\n\
  \  \"meta\": {\n    \"locale\": \"en\",\n    \"pagination\": {\n      \"cursor\"\
  : \"eyJpZCI6MjV9\",\n      \"has_more\": true,\n      \"count\": 25\n    }\n  }\n\
  }\n```\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `meta.pagination.cursor`\
  \ | string\\|null | Opaque token for next page. `null` when has_more=false |\n|\
  \ `meta.pagination.has_more` | bool | `true` if more items exist after this page\
  \ |\n| `meta.pagination.count` | int | Number of items in THIS page (not total)\
  \ |\n\n### Query Parameters\n\n| Param | Type | Default | Max | Description |\n\
  |-------|------|---------|-----|-------------|\n| `cursor` | string | — | — | Opaque\
  \ token from previous page (omit for first page) |\n| `limit` | integer | 25 | 100\
  \ | Items per page |\n\n### Example Flow\n\n```bash\n# Page 1 — first 25 products\n\
  curl \"http://localhost:3000/v1/products?limit=25\"\n# Response: meta.pagination.cursor\
  \ = \"eyJpZCI6MjV9\", has_more = true\n\n# Page 2 — use cursor from page 1\ncurl\
  \ \"http://localhost:3000/v1/products?cursor=eyJpZCI6MjV9&limit=25\"\n# Response:\
  \ meta.pagination.cursor = \"eyJpZCI6NTB9\", has_more = true\n\n# Page 3 — last\
  \ page (say 12 items remain)\ncurl \"http://localhost:3000/v1/products?cursor=eyJpZCI6NTB9&limit=25\"\
  \n# Response: meta.pagination.cursor = null, has_more = false, count = 12\n```\n\
  \n### Important\n\n- **Cursor is opaque** — never parse or construct it client-side\n\
  - **has_more=false** means end of dataset\n- **count** is current page items, not\
  \ total\n- **Order** — created_at DESC, id DESC\n- **Default limit is 25** — specify\
  \ limit for predictable page sizes\n\n### Endpoints with Cursor Pagination\n\nGET\
  \ /v1/products, GET /v1/banners, GET /v1/banners/type/{type},\nGET /v1/articles,\
  \ GET /v1/carts/user/{user_id}, GET /v1/orders,\nGET /v1/orders/user/{user_id},\
  \ GET /v1/deposites, GET /v1/deposites/user/{id},\nGET /v1/landfills, GET /v1/trash/types,\
  \ GET /v1/sallers/products/{id}"
