        in: path
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: Success — paginated list
          examples:
            default:
              summary: default
              value: |-
                {
                  "content": [
                    {
                      "coin": 202,
                      "discount": null,
                      "id": "cmqhhc2z00064pd2degy2ymub",
                      "location": "Medan",
                      "name": "Eksklusif Botol #30",
                      "price": 202082,
                      "sold": 418,
                      "stock": 123,
                      "thumbnail": "https://picsum.photos/seed/prod-30/600/600"
                    },
