openapi: 3.1.0
info:
  title: Reybi API
  version: 1.0.0
  description: |-
    Reybi API — Rust rewrite (Axum 0.8).
    E-commerce platform with cart, orders, deposite, waste management.

    ## Cursor Pagination

    All list endpoints use cursor-based pagination (NO offset). This ensures stable
    pagination even when rows are inserted/deleted between requests.

    ### How It Works

    ```
    GET /v1/products?cursor=eyJpZCI6NTB9&limit=25
    ```

    1. **First page** — omit `cursor`, API returns first N items
    2. **Next pages** — use `cursor` from `meta.pagination` of previous response
    3. **Last page** — `has_more: false`, `cursor: null`

    ### Response Format

    ```json
    {
      "success": true,
      "data": [ ... ],
      "meta": {
        "locale": "en",
        "pagination": {
          "cursor": "eyJpZCI6MjV9",
          "has_more": true,
          "count": 25
        }
      }
    }
    ```

    | Field | Type | Description |
    |-------|------|-------------|
    | `meta.pagination.cursor` | string\|null | Opaque token for next page. `null` when has_more=false |
    | `meta.pagination.has_more` | bool | `true` if more items exist after this page |
    | `meta.pagination.count` | int | Number of items in THIS page (not total) |

    ### Query Parameters

    | Param | Type | Default | Max | Description |
    |-------|------|---------|-----|-------------|
    | `cursor` | string | — | — | Opaque token from previous page (omit for first page) |
    | `limit` | integer | 25 | 100 | Items per page |

    ### Example Flow

    ```bash
    # Page 1 — first 25 products
    curl "http://localhost:3000/v1/products?limit=25"
    # Response: meta.pagination.cursor = "eyJpZCI6MjV9", has_more = true

    # Page 2 — use cursor from page 1
    curl "http://localhost:3000/v1/products?cursor=eyJpZCI6MjV9&limit=25"
    # Response: meta.pagination.cursor = "eyJpZCI6NTB9", has_more = true

    # Page 3 — last page (say 12 items remain)
    curl "http://localhost:3000/v1/products?cursor=eyJpZCI6NTB9&limit=25"
    # Response: meta.pagination.cursor = null, has_more = false, count = 12
    ```

    ### Important

    - **Cursor is opaque** — never parse or construct it client-side
    - **has_more=false** means end of dataset
    - **count** is current page items, not total
    - **Order** — created_at DESC, id DESC
    - **Default limit is 25** — specify limit for predictable page sizes

    ### Endpoints with Cursor Pagination

    GET /v1/products, GET /v1/banners, GET /v1/banners/type/{type},
    GET /v1/articles, GET /v1/carts/user/{user_id}, GET /v1/orders,
    GET /v1/orders/user/{user_id}, GET /v1/deposites, GET /v1/deposites/user/{id},
    GET /v1/landfills, GET /v1/trash/types, GET /v1/sallers/products/{id}
servers:
- url: http://localhost:3000/v1
  description: Development
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
paths:
  /sallers/products/{id}:
    get:
      operationId: get-sallers-products-{id}
      summary: Get seller products
      tags:
      - sallers
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
  /addresses/user/{user_id}:
    post:
      operationId: post-addresses-user-{user_id}
      summary: Create address (auth required)
      tags:
      - addresses
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                main:
                  type: boolean
                address:
                  type: string
                label:
                  type: string
                phone_number:
                  type: string
              required:
              - address
              - label
              - phone_number
    put:
      operationId: put-addresses-user-{user_id}
      summary: Update address (auth required)
      tags:
      - addresses
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
  /auth/register:
    post:
      operationId: post-auth-register
      summary: Register new user
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
              required:
              - name
              - email
              - password
  /articles/{id}:
    get:
      operationId: get-articles-{id}
      summary: Get article by ID
      tags:
      - articles
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    put:
      operationId: put-articles-{id}
      summary: Update article
      tags:
      - articles
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    delete:
      operationId: delete-articles-{id}
      summary: Delete article
      tags:
      - articles
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /orders:
    get:
      operationId: get-orders
      summary: List all orders (admin)
      tags:
      - orders
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
  /articles:
    get:
      operationId: get-articles
      summary: List articles (public)
      tags:
      - articles
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: Articles
  /products:
    get:
      operationId: get-products
      summary: List products (public, no auth required)
      tags:
      - products
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      - name: category
        in: query
        required: false
        schema:
          type: string
      - name: search
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Paginated products
  /deposites:
    get:
      operationId: get-deposites
      summary: List all deposites (admin)
      tags:
      - deposites
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
    post:
      operationId: post-deposites
      summary: Create deposite (auth required)
      tags:
      - deposites
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                landfill_id:
                  type: string
                address_id:
                  type: string
                pickup_time:
                  type: string
                garbage_type:
                  type: array
                coin:
                  type: integer
                type:
                  type: string
                pickup_date:
                  type: string
                images:
                  type: object
              required:
              - address_id
              - pickup_time
              - garbage_type
              - type
              - pickup_date
  /profile/{email}:
    get:
      operationId: get-profile-{email}
      summary: Get user profile
      tags:
      - profile
      parameters:
      - name: email
        in: path
        required: true
        schema:
          type: string
    put:
      operationId: put-profile-{email}
      summary: Update user profile
      tags:
      - profile
      parameters:
      - name: email
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phone_number:
                  type: string
                name:
                  type: string
                role:
                  type: string
                photo_url:
                  type: string
  /products/{id}:
    get:
      operationId: get-products-{id}
      summary: Get product by ID
      tags:
      - products
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '404':
          description: Product not found
        '200':
          description: Product data
    put:
      operationId: put-products-{id}
      summary: Update product
      tags:
      - products
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Updated product
    delete:
      operationId: delete-products-{id}
      summary: Delete product
      tags:
      - products
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Product deleted
  /landfills:
    get:
      operationId: get-landfills
      summary: List landfills (public)
      tags:
      - landfills
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
    post:
      operationId: post-landfills
      summary: Create landfill (admin)
      tags:
      - landfills
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: string
                name:
                  type: string
              required:
              - address
              - name
  /trash/type/{id}:
    put:
      operationId: put-trash-type-{id}
      summary: Update trash type (admin)
      tags:
      - trash
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    delete:
      operationId: delete-trash-type-{id}
      summary: Delete trash type (admin)
      tags:
      - trash
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /carts/user/{user_id}:
    get:
      operationId: get-carts-user-{user_id}
      summary: Get user cart
      tags:
      - carts
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
    post:
      operationId: post-carts-user-{user_id}
      summary: Add item to cart
      tags:
      - carts
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                variant_id:
                  type: string
                product_id:
                  type: string
                quantity:
                  type: integer
              required:
              - product_id
              - quantity
  /trash/types:
    get:
      operationId: get-trash-types
      summary: List trash types (public)
      tags:
      - trash
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
    post:
      operationId: post-trash-types
      summary: Create trash type (admin)
      tags:
      - trash
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                image:
                  type: string
              required:
              - name
  /orders/user/{user_id}:
    get:
      operationId: get-orders-user-{user_id}
      summary: Get user orders
      tags:
      - orders
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
    post:
      operationId: post-orders-user-{user_id}
      summary: Create order (auth required)
      tags:
      - orders
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: string
                quantity:
                  type: integer
                coin:
                  type: integer
                payment:
                  type: object
              required:
              - product_id
              - quantity
              - payment
  /products/variant/{id}:
    post:
      operationId: post-products-variant-{id}
      summary: Add product variant
      tags:
      - products
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                image:
                  type: string
                stock:
                  type: integer
                name:
                  type: string
                price:
                  type: integer
              required:
              - stock
              - name
              - price
      responses:
        '201':
          description: Created variant
  /products/create:
    post:
      operationId: post-products-create
      summary: Create product
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                saller_id:
                  type: string
                price:
                  type: integer
                stock:
                  type: integer
                thumbnail:
                  type: string
                location:
                  type: string
                category:
                  type: string
                discount:
                  type: integer
                images:
                  type: object
                description:
                  type: string
                recommended:
                  type: boolean
                coin:
                  type: integer
                name:
                  type: string
              required:
              - price
              - stock
              - category
              - description
              - name
      responses:
        '201':
          description: Created product
  /orders/{id}:
    delete:
      operationId: delete-orders-{id}
      summary: Cancel order (auth required)
      tags:
      - orders
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /banners/type/{type}:
    get:
      operationId: get-banners-type-{type}
      summary: List banners by type
      tags:
      - banners
      parameters:
      - name: type
        in: path
        required: true
        schema:
          type: string
  /reviews/{id}:
    put:
      operationId: put-reviews-{id}
      summary: Update review (auth required)
      tags:
      - reviews
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                rating:
                  type: integer
  /articles/create:
    post:
      operationId: post-articles-create
      summary: Create article
      tags:
      - articles
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                thumbnail:
                  type: string
                content:
                  type: string
                header:
                  type: string
              required:
              - thumbnail
              - content
              - header
  /reviews:
    post:
      operationId: post-reviews
      summary: Create review (auth required)
      tags:
      - reviews
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                product_id:
                  type: string
                images:
                  type: object
                rating:
                  type: integer
              required:
              - comment
              - product_id
              - rating
  /auth/reset-password:
    post:
      operationId: post-auth-reset-password
      summary: Request password reset
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
              required:
              - email
  /carts/item/{id}:
    delete:
      operationId: delete-carts-item-{id}
      summary: Remove cart item
      tags:
      - carts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /deposites/user/{id}:
    get:
      operationId: get-deposites-user-{id}
      summary: Get user deposites
      tags:
      - deposites
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
  /auth:
    post:
      operationId: post-auth
      summary: Login (Firebase token → JWT)
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: JWT tokens + user data
  /landfills/{id}:
    put:
      operationId: put-landfills-{id}
      summary: Update landfill (admin)
      tags:
      - landfills
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    delete:
      operationId: delete-landfills-{id}
      summary: Delete landfill (admin)
      tags:
      - landfills
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /banners/create:
    post:
      operationId: post-banners-create
      summary: Create banner
      tags:
      - banners
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                image:
                  type: string
                type:
                  type: string
              required:
              - image
  /banners:
    get:
      operationId: get-banners
      summary: List all banners (public)
      tags:
      - banners
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: Banners
