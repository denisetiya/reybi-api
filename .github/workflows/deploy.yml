# ============================================================================
#  Reybi API (Rust) – CI/CD
# ----------------------------------------------------------------------------
#  • on push to `master` / `main` → build image, push to GHCR, SSH into
#       server, pull, restart container, healthcheck.
#  • on PR                       → build image only (sanity check, no push).
# ----------------------------------------------------------------------------
#  Required GitHub Secrets (Settings → Secrets and variables → Actions):
#      SERVER_HOST                 IP / hostname of the deploy server
#      SERVER_PORT                 SSH port (defaults to 22 if not set)
#      SERVER_USER                 SSH user (e.g. "deploy" or "root")
#      SERVER_SSH_KEY              SSH private key (preferred)
#      SERVER_PASSWORD             SSH password (if no SSH key)
#      GHCR_PAT                    GitHub PAT w/ scope: read:packages
#      DEPLOY_PATH                 absolute path on server
#      API_PORT                    host port (e.g. 3000)
#      POSTGRES_USER               postgres user (default: hura)
#      POSTGRES_PASSWORD           postgres password
#      POSTGRES_DB                 postgres database (default: reybi)
#      REDIS_HOST                  redis hostname (default: infra-redis)
#      REDIS_PASSWORD              redis password
#      JWT_ACCESS_SECRET           JWT secret
#      JWT_REFRESH_SECRET          JWT secret
#      KEY_SERVER                  x-key-server header value
#      FIREBASE_PROJECT_ID         Firebase project id
#      FIREBASE_CREDENTIALS_B64    base64 of firebase-service-account.json
#      MIDTRANS_SERVER_KEY         Midtrans server key
#      MIDTRANS_CLIENT_KEY         Midtrans client key
#      MIDTRANS_IS_PRODUCTION      "true" or "false"
#      CLOUDFLARE_TUNNEL_TOKEN     tunnel token from Zero Trust dashboard
#      RUN_SEED                    "true" to apply view migrations + triggers
# ============================================================================

name: build-and-deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # -----------------------------------------------------------------------
  #  1. Lint (fast, fails fast on PRs)
  # -----------------------------------------------------------------------
  test:
    name: cargo check + clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings
        continue-on-error: true

      - name: cargo check
        run: cargo check --locked --all-targets

  # -----------------------------------------------------------------------
  #  2. Build & push image to GHCR (only on main / manual)
  # -----------------------------------------------------------------------
  build:
    name: build & push (ghcr.io)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image ref
        id: image
        run: |
          IMAGE_NAME=$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)
          echo "name=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "ref=${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # -----------------------------------------------------------------------
  #  3. Deploy to the server via SSH
  #    • secrets are passed as env vars (via `envs:`) to appleboy/ssh-action
  #    • server renders `.env` from `.env.example` using `envsubst` (so the
  #      template file holds placeholders; secrets never appear in the repo)
  #    • server pulls image, restarts container, healthchecks, prunes
  # -----------------------------------------------------------------------
  deploy:
    name: deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Prepare firebase credentials file
        run: |
          if [ -n "${{ secrets.FIREBASE_CREDENTIALS_B64 }}" ]; then
            echo "${{ secrets.FIREBASE_CREDENTIALS_B64 }}" | base64 -d > firebase-service-account.json
            chmod 600 firebase-service-account.json
            echo "✔ firebase-service-account.json decoded"
          else
            echo "::notice::FIREBASE_CREDENTIALS_B64 not set; assuming server has its own"
          fi

      - name: Sync files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: ".env.example,docker-compose.prod.yml,migrations"
          target: "${{ secrets.DEPLOY_PATH }}/"
          overwrite: true
          strip_root: true

      - name: Sync firebase credentials (if present)
        if: ${{ env.FIREBASE_CREDENTIALS_B64 != '' }}
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "firebase-service-account.json"
          target: "${{ secrets.DEPLOY_PATH }}/"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ needs.build.outputs.image_ref || 'reybi-api:local' }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 10m
          envs: IMAGE,IMAGE_LOCAL,API_PORT,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,REDIS_HOST,REDIS_PASSWORD,KEY_SERVER,JWT_ACCESS_SECRET,JWT_REFRESH_SECRET,FIREBASE_PROJECT_ID,MIDTRANS_SERVER_KEY,MIDTRANS_CLIENT_KEY,MIDTRANS_IS_PRODUCTION,CLOUDFLARE_TUNNEL_TOKEN,RUN_SEED,GITHUB_TOKEN
          script: |
            set -euo pipefail
            # default IMAGE if runner didn't forward it (avoids `set -u` crash)
            IMAGE="${IMAGE:-reybi-api:local}"
            # default API_PORT if not forwarded
            API_PORT="${API_PORT:-3000}"
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"

            # 0. ensure envsubst is available
            if ! command -v envsubst >/dev/null 2>&1; then
              sudo apt-get update -y >/dev/null 2>&1
              sudo apt-get install -y gettext-base >/dev/null 2>&1
            fi

            # 1. render .env from .env.example using real secrets, BUT only
            #    if server doesn't already have a working .env.  This avoids
            #    clobbering manually-managed secrets (postgres user, redis
            #    password) on every deploy when those aren't rotated in GH.
            if [ ! -f .env ] || ! grep -qE '^(DATABASE_URL|REDIS_URL)=.+' .env; then
              envsubst < .env.example > .env
              chmod 600 .env
              echo "✔ .env rendered from .env.example + secrets ($(wc -l < .env) lines)"
            else
              echo "✔ .env preserved (server-managed, not regenerated)"
            fi

            # 2. apply view migrations + triggers (one-shot, idempotent)
            if [ "${RUN_SEED:-false}" = "true" ]; then
              echo "▶ applying view migrations + triggers…"
              docker run --rm \
                --network db-shared \
                -e PGPASSWORD="${POSTGRES_PASSWORD}" \
                postgres:16-alpine \
                sh -c "psql -h infra-postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} -v ON_ERROR_STOP=0 -f -" \
                < migrations/20260101000002_plural_views.sql || true
              docker run --rm \
                --network db-shared \
                -e PGPASSWORD="${POSTGRES_PASSWORD}" \
                postgres:16-alpine \
                sh -c "psql -h infra-postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} -v ON_ERROR_STOP=0 -f -" \
                < migrations/20260101000003_updated_at_trigger.sql || true
            fi

            # 3. login to ghcr.io + pull image
            # Try GHCR_PAT first (most permissive); fall back to GITHUB_TOKEN
            # which has read access to the repo's own packages automatically.
            GH_USER="${{ github.actor }}"
            if [ -n "${GHCR_PAT:-}" ]; then
              echo "${GHCR_PAT}" \
                | docker login ghcr.io -u "${GH_USER}" --password-stdin
            elif [ -n "${GITHUB_TOKEN:-}" ]; then
              echo "${GITHUB_TOKEN}" \
                | docker login ghcr.io -u "${GH_USER}" --password-stdin
            fi
            echo "▶ pulling ${IMAGE}"
            # Pull the GHCR image; on 403/404 fall back to local tag so the
            # server can still boot if GHCR is unreachable or the token
            # doesn't have package read scope.
            if ! docker pull "${IMAGE}" 2>&1; then
              echo "⚠ GHCR pull failed — falling back to ${IMAGE_LOCAL:-reybi-api:local}"
              docker pull "${IMAGE_LOCAL:-reybi-api:local}" || true
              IMAGE="${IMAGE_LOCAL:-reybi-api:local}"
            fi
            docker logout ghcr.io >/dev/null 2>&1 || true

            # 4. start api + cloudflared (use IMAGE env so compose file ${IMAGE} resolves)
            export IMAGE
            docker compose -f docker-compose.prod.yml up -d api cloudflared

            # 5. wait for api healthcheck
            echo "▶ waiting for api healthcheck…"
            for i in {1..30}; do
              if curl -fsS "http://127.0.0.1:${API_PORT}/" >/dev/null 2>&1; then
                echo "✔ api is up"
                break
              fi
              sleep 2
            done

            # 6. prune old images
            docker image prune -f --filter "until=72h" || true
